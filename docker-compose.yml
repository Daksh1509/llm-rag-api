version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env                    # Injects your real API keys
    volumes:
      - ./data:/app/data        # Persist uploaded documents
      - ./embeddings:/app/embeddings  # Persist FAISS index between restarts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s         # Give model time to load on first start